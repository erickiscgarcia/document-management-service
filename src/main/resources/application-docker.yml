info:
  app:
    name: Document Management Service
    description: Reactive service for uploading and managing PDF documents
    version: 1.0.0

spring:
  r2dbc:
    url: r2dbc:postgresql://postgres:5432/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  sql:
    init:
      mode: never

  application:
    name: document-management-service

minio:
  endpoint: http://minio:9000
  access-key: ${MINIO_ACCESS_KEY}
  public-url: ${MINIO_PUBLIC_ENDPOINT}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET}

logging:
  level:
    org.springframework.r2dbc: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

app:
  max-file-size-bytes: 524288000